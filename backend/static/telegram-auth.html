<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram Авторизация</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAF7F2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .icon {
      width: 56px;
      height: 56px;
      background: #E3F2FD;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    h2 {
      font-size: 20px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    #telegram-widget { display: flex; justify-content: center; }
    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #4CAF50;
      display: none;
    }
    .status.error { color: #F44336; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h2>Привяжите Telegram</h2>
    <p>Нажмите кнопку ниже, чтобы войти через Telegram и привязать аккаунт</p>
    <div id="telegram-widget">
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="donskih_authorization_bot"
        data-size="large"
        data-radius="12"
        data-onauth="onTelegramAuth(user)"
        data-request-access="write">
      </script>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    function onTelegramAuth(user) {
      var status = document.getElementById('status');
      status.style.display = 'block';
      status.textContent = 'Авторизация...';
      status.className = 'status';

      try {
        if (window.TelegramAuth && window.TelegramAuth.postMessage) {
          window.TelegramAuth.postMessage(JSON.stringify(user));
        } else {
          status.textContent = 'Ошибка: канал связи не найден';
          status.className = 'status error';
        }
      } catch (e) {
        status.textContent = 'Ошибка: ' + e.message;
        status.className = 'status error';
      }
    }
  </script>
</body>
</html>
