# Добавить в server { } для donskih-cdn.ru (внутри блока server_name donskih-cdn.ru; ...)
# Либо подключить отдельно: include /etc/nginx/snippets/donskih-admin.conf;

    # Редирект /admin -> /admin/
    location = /admin {
        return 302 /admin/;
    }

    # Админка Flutter (SPA)
    location /admin/ {
        alias /var/www/donskih-admin/;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache";
    }

    # Крупные видео-загрузки из админки
    location /api/v1/admin/content/upload-video {
        client_max_body_size 2048M;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/admin/content/upload-checklist {
        client_max_body_size 2048M;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
