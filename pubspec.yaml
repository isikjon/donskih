name: club_app
description: "Premium Club App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  url_launcher: ^6.2.0
  video_player: ^2.11.0
  http: ^1.6.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  web_socket_channel: ^3.0.1
  image_picker: ^1.1.2
  uuid: ^4.5.3
  flutter_cache_manager: ^3.4.1
  photo_view: ^0.15.0
  flutter_quill: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.26.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/telegram_photos/
    - assets/telegram_thumbs/
